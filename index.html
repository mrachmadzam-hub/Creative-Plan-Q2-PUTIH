<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUTIH Q2 Strategy - Zamo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Framer Motion (Development CDNs for simplicity) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #02040a;
            color: #cbd5e1;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .text-gradient {
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #02040a;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // Icons placeholder components since lucide-react works differently via CDN
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [activeMonth, setActiveMonth] = useState('APRIL');
            
            useEffect(() => {
                // Initialize lucide icons after render
                lucide.createIcons();
            }, [activeMonth]);

            const strategyData = {
                APRIL: {
                    theme: "Pasca Lebaran & Recovery",
                    momentum: "Arus Balik & Silaturahmi (Lebaran 21 Maret)",
                    hero: ["SWS (Whitening Soap)", "SWK (Whitening Kit)", "PWF (Water Flosser)"],
                    giveaway: {
                        period: "15 - 21 Maret",
                        announcement: "27 / 28 Maret",
                        note: "Kado Lebaran / THR momentum"
                    },
                    content: [
                        {
                            title: "Detox Gigi Pasca Lebaran",
                            hook: "Detox gigi abis tempur opor & rendang!",
                            visual: "Macro shot PWF angkat sisa daging di sela gigi.",
                            desc: "Fokus ke kebersihan sela gigi setelah makan besar."
                        },
                        {
                            title: "Confidence Restoration",
                            hook: "Balik ngantor dengan senyum paling kinclong.",
                            visual: "Before-after 7 hari pemakaian SWS/SWK.",
                            desc: "Hapus noda kopi/teh sisa kunjungan silaturahmi."
                        }
                    ],
                    extra: "Hari Kartini Activation (21 April)"
                },
                MEI: {
                    theme: "Edukasi & Self-Care",
                    momentum: "Banyak Hari Libur Nasional (Waisak & Kenaikan)",
                    hero: ["PWS (Whitening Strip)"],
                    giveaway: null,
                    content: [
                        {
                            title: "Product Comparison",
                            hook: "Gigi sensitif tapi pengen putih? Ini solusinya.",
                            visual: "Split-screen tekstur & cara pakai SWS vs PWS.",
                            desc: "Edukasi formula PAP yang aman & nggak bikin ngilu."
                        },
                        {
                            title: "Long Weekend Ritual",
                            hook: "Liburan produktif: Glow up dari rumah.",
                            visual: "POV aesthetic pake PWS pas staycation/rebahan.",
                            desc: "Posisikan perawatan gigi sebagai aktivitas me-time."
                        }
                    ],
                    extra: "Flash Sale Tanggal Merah"
                },
                JUNI: {
                    theme: "Professional Daily Routine",
                    momentum: "Musim Wisuda, Libur Sekolah & Kondangan",
                    hero: ["SWK (Full Kit)", "Teeth Guard"],
                    giveaway: null,
                    content: [
                        {
                            title: "Home Clinic Authority",
                            hook: "Nggak perlu ke klinik, cukup 15 menit di rumah.",
                            visual: "Cinematic unboxing bedah isi kit (Light, Gel, Ruler).",
                            desc: "Tunjukkan kelengkapan alat agar audiens percaya kualitasnya."
                        },
                        {
                            title: "Total Night Routine",
                            hook: "Protect your smile while you sleep.",
                            visual: "Tutorial pakai SWK ditutup dengan Teeth Guard.",
                            desc: "Edukasi cegah gigi aus (bruxism) sekaligus memutihkan."
                        }
                    ],
                    extra: "Wedding Season Special Package"
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 border-b border-white/5 bg-black/40 backdrop-blur-xl">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-lg shadow-white/10">
                                    <Icon name="sparkles" className="text-black" />
                                </div>
                                <span className="text-xl font-black tracking-tighter text-white uppercase italic">PUTIH.</span>
                            </div>
                            <div className="hidden md:flex gap-8">
                                <button className="bg-blue-600 text-white px-6 py-2 rounded-full font-bold text-xs tracking-widest hover:bg-blue-500 transition-all">
                                    Q2 ROADMAP
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-6 pt-40">
                        {/* Hero */}
                        <motion.section 
                            initial={{ opacity: 0, y: 20 }}
                            animate={{ opacity: 1, y: 0 }}
                            className="mb-24"
                        >
                            <span className="px-4 py-1.5 rounded-full text-[10px] font-black border border-blue-500/20 bg-blue-500/10 text-blue-400 tracking-widest uppercase">
                                Creative Strategy 2026
                            </span>
                            <h1 className="text-6xl md:text-8xl font-black text-white mt-6 mb-8 tracking-tighter leading-[0.9]">
                                ACTION <span className="text-gradient italic">PLAN.</span>
                            </h1>
                            <p className="text-xl text-slate-400 max-w-2xl leading-relaxed">
                                Transformasi brand PUTIH dari momentum Lebaran ke rutinitas perawatan profesional harian.
                            </p>
                        </motion.section>

                        {/* Giveaway Timeline */}
                        <section className="mb-24">
                            <div className="glass rounded-[32px] p-8 md:p-12 border border-white/10 flex flex-col lg:flex-row items-center justify-between gap-10">
                                <div className="flex gap-8 items-center">
                                    <div className="bg-blue-600 p-5 rounded-2xl">
                                        <Icon name="gift" className="text-white" size={32} />
                                    </div>
                                    <div>
                                        <h3 className="text-2xl font-black text-white mb-1">Giveaway Timeline</h3>
                                        <p className="text-slate-500">Aktivasi Kado Lebaran Q2</p>
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-12 border-l border-white/10 pl-12">
                                    <div>
                                        <p className="text-[10px] uppercase font-black text-slate-500 tracking-widest mb-2">Periode</p>
                                        <p className="text-xl font-bold text-white italic">15 - 21 Mar</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] uppercase font-black text-slate-500 tracking-widest mb-2">Pengumuman</p>
                                        <p className="text-xl font-bold text-blue-400 italic">27 / 28 Mar</p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Tabs */}
                        <section className="mb-32">
                            <div className="flex flex-col lg:flex-row justify-between items-end gap-10 mb-16">
                                <div>
                                    <h2 className="text-3xl font-black text-white mb-2">Monthly Matrix</h2>
                                    <p className="text-slate-500">Klik tiap bulan untuk detail teknis.</p>
                                </div>
                                <div className="flex bg-white/5 p-1.5 rounded-2xl border border-white/10">
                                    {['APRIL', 'MEI', 'JUNI'].map(month => (
                                        <button
                                            key={month}
                                            onClick={() => setActiveMonth(month)}
                                            className={`px-8 py-3 rounded-xl text-[10px] font-black tracking-widest transition-all ${activeMonth === month ? 'bg-white text-black shadow-xl scale-105' : 'text-slate-500 hover:text-white'}`}
                                        >
                                            {month}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <AnimatePresence mode="wait">
                                <motion.div 
                                    key={activeMonth}
                                    initial={{ opacity: 0, x: 20 }}
                                    animate={{ opacity: 1, x: 0 }}
                                    exit={{ opacity: 0, x: -20 }}
                                    transition={{ duration: 0.3 }}
                                    className="grid lg:grid-cols-12 gap-8"
                                >
                                    <div className="lg:col-span-8">
                                        <div className="glass rounded-[32px] p-10 border-blue-500/10">
                                            <div className="flex items-center gap-3 mb-8">
                                                <Icon name="clock" className="text-blue-400" size={16} />
                                                <span className="text-blue-400 font-bold uppercase tracking-widest text-[10px]">{strategyData[activeMonth].momentum}</span>
                                            </div>
                                            <h3 className="text-4xl font-black text-white mb-12 tracking-tight">{strategyData[activeMonth].theme}</h3>
                                            
                                            <div className="grid md:grid-cols-2 gap-10">
                                                {strategyData[activeMonth].content.map((item, idx) => (
                                                    <div key={idx} className="space-y-4">
                                                        <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Angle 0{idx+1}</span>
                                                        <h4 className="text-xl font-bold text-white">"{item.hook}"</h4>
                                                        <div className="p-5 rounded-2xl bg-white/[0.03] border border-white/5 space-y-3">
                                                            <p className="text-xs text-slate-300"><span className="text-slate-500 font-bold uppercase mr-2">Visual:</span>{item.visual}</p>
                                                            <p className="text-xs text-slate-400 leading-relaxed">{item.desc}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="lg:col-span-4 space-y-6">
                                        <div className="glass rounded-[32px] p-8">
                                            <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Hero Products</h4>
                                            <div className="space-y-3">
                                                {strategyData[activeMonth].hero.map((h, i) => (
                                                    <div key={i} className="flex items-center justify-between p-4 bg-black/20 border border-white/5 rounded-xl">
                                                        <span className="font-bold text-white text-sm">{h}</span>
                                                        <Icon name="check-circle-2" className="text-emerald-500" size={18} />
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="bg-indigo-600/10 border border-indigo-500/20 rounded-[32px] p-8">
                                            <h4 className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-4">Aktivasi Taktis</h4>
                                            <p className="text-white font-black text-2xl">{strategyData[activeMonth].extra}</p>
                                        </div>
                                    </div>
                                </motion.div>
                            </AnimatePresence>
                        </section>
                    </main>

                    <footer className="max-w-7xl mx-auto px-6 pt-20 border-t border-white/5 text-center">
                        <p className="text-[9px] font-black uppercase tracking-[0.5em] text-slate-600">PUTIH &copy; 2026 STRATEGY BY ZAMO</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
